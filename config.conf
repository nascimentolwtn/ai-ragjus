# AI-JusRAG Configuration File
# Este arquivo é lido pelos scripts do ecossistema AI-JusRAG

# Caminho para a pasta onde os documentos originais (PDF, DOCX, etc) são armazenados
PASTA_ALVO="/Applications/SERVER/ - AI PROJTEMP/ai-jus-rag-app/docs"

# Diretório de cache e banco de dados local
CACHE_DIR="./.cache_vetorial"

# Endpoint do servidor Ollama local (ou outro provedor local compatível com a API OpenAI/Ollama)
OLLAMA_URL="http://localhost:11434"

# Modelos recomendados e obrigatórios
MODELO_IA="qwen2.5:1.5b"
MODELO_EMBEDDING="nomic-embed-text"

# Limites do sistema
MAX_FILE_SIZE_MB=50
CHUNK_SIZE=1000
CHUNK_OVERLAP=200
