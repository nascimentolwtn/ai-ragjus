# AI-RAGJus Configuration File
# Lido pelos scripts do ecossistema AI-RAGJus

# Caminho para documentos (PDF, DOCX, PPTX, etc)
PASTA_ALVO="./docs"

# Diretório de cache e banco de dados vetorial
CACHE_DIR="./.cache_vetorial"

# Endpoint Ollama local
OLLAMA_URL="http://localhost:11434"

# Modelos para chat/inference e embeddings
MODELO_IA="qwen3.5:4b"
MODELO_EMBEDDING="nomic-embed-text"

# Limites de sistema
MAX_FILE_SIZE_MB=50
CHUNK_SIZE=1000
CHUNK_OVERLAP=200

# Parâmetros de geração
TEMPERATURA=0

# Janela de contexto (num_ctx) enviada ao Ollama, em tokens.
# qwen2.5-coder:7b-instruct: janela nativa de 32K, mas o Ollama usa 4096 por
# padrão se num_ctx não for explicitado - isso trunca prompts silenciosamente.
# Ajuste conforme a RAM disponível (16384 é conservador para 8GB+).
CONTEXT_WINDOW=16384

# Fator de estimativa de tokens usado pelo monitor de contexto da interface
# web (1 token ~= 1/TOKEN_RATIO caracteres). 0.30 ~= 3.3 chars/token,
# calibrado para texto jurídico em português (subestima para avisar cedo).
TOKEN_RATIO=0.30

# RAGSEC (RBAC / Classificação / DLP / Auditoria) - desativado por padrão.
# A build jurídica padrão (AI-JusRAG) permanece 100% inalterada quando RAGSEC_MODE=0.
RAGSEC_MODE=0
AUDIT_RETENTION_DIAS=365
