# AI-RAGJus Configuration File
# Lido pelos scripts do ecossistema AI-RAGJus

# Caminho para documentos (PDF, DOCX, PPTX, etc)
PASTA_ALVO="./docs"

# Diretório de cache e banco de dados vetorial
CACHE_DIR="./.cache_vetorial"

# Endpoint Ollama local
OLLAMA_URL="http://localhost:11434"

# Modelos para chat/inference e embeddings
MODELO_IA="qwen:4b"
MODELO_EMBEDDING="nomic-embed-text"

# Limites de sistema
MAX_FILE_SIZE_MB=50
CHUNK_SIZE=1000
CHUNK_OVERLAP=200

# Parâmetros de geração
TEMPERATURA=0

# Backend de inferência (ollama ou llamacpp)
BACKEND="ollama"

# RAGSEC (RBAC / Classificação / DLP / Auditoria) - desativado por padrão.
# A build jurídica padrão (AI-JusRAG) permanece 100% inalterada quando RAGSEC_MODE=0.
RAGSEC_MODE=0
AUDIT_RETENTION_DIAS=365
