# AI-RAGJus Configuration File
# Lido pelos scripts do ecossistema AI-RAGJus

# Caminho para documentos (PDF, DOCX, PPTX, etc)
PASTA_ALVO="./docs"

# Diretório de cache e banco de dados vetorial
CACHE_DIR="./.cache_vetorial"

# Endpoint Ollama local
OLLAMA_URL="http://localhost:11434"
OLLAMA_URL_EMBEDDING="http://localhost:11435"

# Modelos para chat/inference e embeddings
MODELO_IA="lfm2.5:8b"
MODELO_EMBEDDING="nomic-embed-text"

# Limites de sistema
MAX_FILE_SIZE_MB=50
CHUNK_SIZE=1000
CHUNK_OVERLAP=200

# Parâmetros de geração
TEMPERATURA=0

# Janela de contexto (num_ctx) enviada ao Ollama, em tokens.
# O Ollama usa 4096 por padrão se num_ctx não for explicitado - isso trunca
# prompts silenciosamente. "auto" resolve o valor a partir do modelo
# configurado em MODELO_IA usando o mapa MODELO_CONTEXT_MAP em src/config.sh
# (detect_model_context() em src/ai.sh), com fallback de 8192 para modelos
# desconhecidos. Defina um número explícito aqui para sobrescrever a detecção.
CONTEXT_WINDOW="auto"

# Fator de estimativa de tokens usado pelo monitor de contexto da interface
# web (1 token ~= 1/TOKEN_RATIO caracteres). 0.30 ~= 3.3 chars/token,
# calibrado para texto jurídico em português (subestima para avisar cedo).
TOKEN_RATIO=0.30

# RAGSEC (RBAC / Classificação / DLP / Auditoria) - desativado por padrão.
# A build jurídica padrão (AI-JusRAG) permanece 100% inalterada quando RAGSEC_MODE=0.
RAGSEC_MODE=0
AUDIT_RETENTION_DIAS=365

# Camada de clarificação de prompt: antes de gerar a resposta, reescreve
# pedidos curtos/ambíguos (ex.: "dobre esse texto") em uma instrução mais
# detalhada, exibida como bloco <think>. Não afeta a busca vetorial, que
# sempre usa a pergunta original. Ligado por padrão; desligue para comparar
# a resposta "crua" de um modelo sem essa etapa extra.
PROMPT_CLARIFICATION=1
